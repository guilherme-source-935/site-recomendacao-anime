<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="../js/components/header.js"></script>
    <script src="../js/components/footer.js"></script>
    <script src="../js/components/button.js" defer></script>
    <title>Sugestões</title>
</head>
<body>
    <site-header></site-header>
    <main class="forms-principal">
        <form action="#" class="form-sugestoes forms-geral">
            <label for="nome">Nome</label>
            <input type="text" name="nome" id="nome" placeholder="Digite o seu nome" required>
            <br>
            <label for="email">Email</label>
            <input type="email" name="email" id="email" placeholder="exemplo@email.com" required>
            <br>
            <label for="mensagem">Envie uma sugestão para o dev!</label>
            <textarea name="mensagem-sugestao" id="mensagem-sugestao" rows="5" cols="35"></textarea>
            <button type="submit" class="btn enviar" id="botao-mensagem">Enviar</button>
        </form>
    </main>
    <site-footer></site-footer>
</body>
</html>
